<div class="biz-page">
  <header class="biz-page__header">
    <a routerLink="/negocio" class="biz-back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#241510" stroke-width="2.5" stroke-linecap="round"><path d="M15 6l-6 6 6 6"/></svg>
      Panel
    </a>
    <h1 class="cv2-serif biz-page__title">Datos del <span class="cv2-serif-i accent">negocio</span></h1>
    <p class="biz-page__sub">Actualiza la información que ven tus clientes en el catálogo.</p>
  </header>

  <!-- Preview card -->
  <div class="biz-preview">
    <div class="biz-preview__visual" [style.background]="color">
      <span class="biz-preview__emoji">{{ emoji }}</span>
    </div>
    <div class="biz-preview__info">
      <span class="biz-preview__name">{{ name }}</span>
      <span class="biz-preview__cat">{{ categoryId }} · {{ neighborhood }}</span>
      <span class="biz-preview__schedule">{{ schedule }}</span>
    </div>
  </div>

  <!-- Form -->
  <div class="biz-form">
    <div class="form-section">
      <h3 class="form-section__title">Identidad</h3>
      <div class="form-row">
        <div class="form-group form-group--grow">
          <label>Nombre del negocio</label>
          <input [(ngModel)]="name" placeholder="Ej. Taquería la Esquina">
        </div>
        <div class="form-group" style="width:80px">
          <label>Emoji</label>
          <input [(ngModel)]="emoji" placeholder="🌮" maxlength="4" style="text-align:center;font-size:22px">
        </div>
      </div>

      <div class="form-group">
        <label>Categoría</label>
        <div class="cat-pills">
          @for (c of categories; track c.id) {
            <button
              class="cat-pill"
              [class.cat-pill--active]="categoryId === c.id"
              (click)="categoryId = c.id"
            >
              {{ c.emoji }} {{ c.label }}
            </button>
          }
        </div>
      </div>

      <div class="form-group">
        <label>Descripción</label>
        <textarea [(ngModel)]="description" rows="4" maxlength="600" placeholder="Qué ofreces, tu especialidad..."></textarea>
        <span class="form-counter">{{ description.length }}/600</span>
      </div>
    </div>

    <div class="form-section">
      <h3 class="form-section__title">Ubicación</h3>
      <div class="form-group">
        <label>Dirección</label>
        <input [(ngModel)]="address" placeholder="Calle, número, colonia">
      </div>
      <div class="form-group">
        <label>Colonia / Barrio</label>
        <input [(ngModel)]="neighborhood" placeholder="Ej. Roma Norte">
      </div>
    </div>

    <div class="form-section">
      <h3 class="form-section__title">Contacto y horario</h3>
      <div class="form-row">
        <div class="form-group form-group--grow">
          <label>Teléfono</label>
          <input type="tel" [(ngModel)]="phone" placeholder="5512345678">
        </div>
        <div class="form-group form-group--grow">
          <label>Instagram</label>
          <input [(ngModel)]="instagram" placeholder="@tu_negocio">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group form-group--grow">
          <label>Horario</label>
          <input [(ngModel)]="schedule" placeholder="Lun-Dom 12:00-23:00">
        </div>
        <div class="form-group form-group--grow">
          <label>Método de pago</label>
          <input [(ngModel)]="paymentMethod" placeholder="Efectivo, tarjeta">
        </div>
      </div>
    </div>

    <div class="form-section">
      <h3 class="form-section__title">Apariencia</h3>
      <div class="form-row">
        <div class="form-group" style="width:160px">
          <label>Rango de precio</label>
          <input [(ngModel)]="priceRange" placeholder="$25-60">
        </div>
        <div class="form-group" style="width:160px">
          <label>Color de tarjeta</label>
          <div class="color-field">
            <input [(ngModel)]="color" placeholder="#FFB57A" maxlength="7">
            <span class="color-swatch" [style.background]="color"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Save -->
  <div class="biz-save">
    <button class="cv2-btn cv2-btn-primary biz-save__btn" [disabled]="saving()" (click)="save()">
      {{ saving() ? 'Guardando...' : 'Guardar cambios →' }}
    </button>
  </div>
</div>
