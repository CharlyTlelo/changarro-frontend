          d="M30 78C30 78 45 55 75 55H225C255 55 270 78 270 78"

        <rect x="115" y="100" width="35" height="12" fill="#F7B801" />

      <p class="subhead">

        Comida, tienda, servicios, entretenimiento, salud
        <span class="nobr">y pura </span><span class="hl-pink">tradición&nbsp;viva</span>.
      </p>
