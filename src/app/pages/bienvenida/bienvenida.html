<div class="screen">
  <!-- Confetti -->
  <div class="confetti-dot" style="left:40px;top:80px;background:#F5B92E;transform:rotate(-20deg)"></div>
  <div class="confetti-dot" style="left:320px;top:100px;background:#4A8A3A;transform:rotate(15deg)"></div>
  <div class="confetti-dot" style="left:60px;top:170px;background:#E8628E;transform:rotate(10deg)"></div>
  <div class="confetti-dot" style="right:50px;top:180px;background:#FCF7EC;transform:rotate(25deg)"></div>
  <div class="confetti-dot" style="left:100px;top:240px;background:#2B6FA0;transform:rotate(30deg)"></div>
  <div class="confetti-dot" style="right:110px;top:260px;background:#F5B92E;transform:rotate(-10deg)"></div>
  <div class="confetti-dot" style="left:200px;top:90px;background:#FCF7EC;transform:rotate(8deg)"></div>
  <div class="confetti-dot" style="left:30px;top:280px;background:#E8628E;transform:rotate(-25deg)"></div>
  <div class="confetti-dot" style="right:40px;top:320px;background:#4A8A3A;transform:rotate(18deg)"></div>

  <div class="content">
    <div class="celebration">
      <div class="cv2-bounce party-emoji">🎉</div>
      <h1 class="cv2-serif welcome-title">
        ¡Listo, María!<br>
        <span class="cv2-serif-i">eres del barrio</span>
      </h1>
      <p class="welcome-sub">Tu cuenta está lista. Aquí tienes tus primeros regalos:</p>

      <!-- Rewards -->
      <div class="rewards">
        @for (r of rewards; track r.label) {
          <div class="reward-card">
            @if (r.isCoin) {
              <div class="cv2-coin reward-coin">$</div>
            } @else {
              <div class="reward-icon" [style.background]="r.color" [style.color]="r.textColor || 'var(--ink)'">{{ r.emoji }}</div>
            }
            <div class="reward-info">
              <div class="cv2-serif reward-label">{{ r.label }}</div>
              <div class="reward-sub">{{ r.sub }}</div>
            </div>
          </div>
        }
      </div>
    </div>

    <div class="bottom-actions">
      <a routerLink="/catalogo" class="explore-btn">Empezar a explorar →</a>
      <div class="biz-link">
        ¿Tienes un negocio? <strong class="biz-link-strong">Regístralo aquí</strong>
      </div>
    </div>
  </div>
</div>
